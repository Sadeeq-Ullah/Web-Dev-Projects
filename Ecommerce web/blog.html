<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/Ecommerce web/img/favicon.png" type="image">
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="/Ecommerce web/css/home.css">
    <title>Blog - Furni.</title>
</head>

<body>
    <!-- Injected via sync.js -->
    <header></header>

    <div class="blog-content">

        <!-- === Hero Section === -->
        <div class="hero">
            <div class="hero-text">
                <h1 id="hero-heading" style="font-size: 2.8rem;">Blog</h1>
                <div class="hero-para">Donec vitae odio quis nisl dapibus malesuada. Nullam ac aliquet velit. Aliquam
                    vulputate
                    velit imperdiet dolor tempor tristique.</div>

                <div class="buttons">
                    <div id="shope-now"><a href="/Ecommerce web/shop.html">Shop Now</a></div>
                    <button id="explore">Explore</button>
                </div>
            </div>
            <div class="hero-image">
                <img src="/Ecommerce web/img/couch.png" alt="">
            </div>
        </div>

        <!-- === Blog Posts Section === -->
        <div id="blog-section">
            <h1 class="blog-head">Recent Blog</h1>

            <!-- Populated dynamically via script.js -->
            <div class="blogs-wrapper"></div>

            <!-- Blog post card template — cloned per post in JS -->
            <template class="blog-template">
                <div class="blog-post">
                    <div class="blog-image"><img src="" alt="post-img" class="blog-pic"></div>
                    <h3 class="blog-info"></h3>
                    <p class="blog-by"><span>by <a href="#" class="blog-title"></a> on <a href="#">Dec
                                19,2021</a></span></p>
                </div>
                <strong class="view-post"><a href="#">View All Posts</a></strong>
            </template>
        </div>

        <!-- === Testimonials Section === -->
        <div class="testimonials-section">
            <h1 class="test-head">Testimonials</h1>

            <div class="testimonial-frame">
                <div class="left" id="left-arrow"><img src="/Ecommerce web/img/right-arrow.png" alt=""></div>

                <!-- Populated dynamically via script.js -->
                <div class="testimonials-wrapper"></div>

                <!-- Testimonial card template — cloned per entry in JS -->
                <template class="testimonial-temp">
                    <div class="testimonial-card">
                        <blockquote>
                            <p class="test-info">
                                Donec facilisis quam ut purus rutrum lobortis. Donec vitae
                                odio quis nisl dapibus malesuada. Nullam ac aliquet velit. Aliquam
                                vulputate velit imperdiet dolor tempor tristique. Pellentesque
                                habitant morbi tristique senectus et netus et malesuada fames ac
                                turpis egestas. Integer convallis volutpat dui quis
                                scelerisque.
                            </p>
                        </blockquote>
                        <div class="person-pic">
                            <img src="" alt="person-pic" class="person-1-img">
                        </div>
                        <h3 class="person-title"></h3>
                        <p class="role">CEO, Co-Founder, XYZ Inc.</p>
                    </div>
                </template>

                <div class="right" id="right-arrow"><img src="/Ecommerce web/img/right-arrow.png" alt=""></div>
            </div>
        </div>

    </div>

    <!-- Injected via sync.js -->
    <div id="footer-section"></div>

    <!-- sync.js loads shared header/footer; script.js handles blog & testimonial rendering -->
    <script src="/Ecommerce web/js/sync.js" type="module" defer></script>
    <script src="/Ecommerce web/js/script.js" type="module" defer></script>

</body>

</html>
