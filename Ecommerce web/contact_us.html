<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/Ecommerce web/img/favicon.png" type="image">
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="/Ecommerce web/css/cont_us.css">
    <link rel="stylesheet" href="/Ecommerce web/css/home.css">
    <title>Contact us - Furni.</title>
</head>

<body>
    <!-- Injected via sync.js -->
    <header></header>

    <div class="contact-content">

        <!-- === Hero Section === -->
        <div class="hero">
            <div class="hero-text">
                <h1 id="hero-heading" style="font-size: 2.8rem;">Contact</h1>
                <div class="hero-para">Donec vitae odio quis nisl dapibus malesuada. Nullam ac aliquet velit. Aliquam
                    vulputate
                    velit imperdiet dolor tempor tristique.</div>
                <div class="buttons">
                    <div id="shope-now"><a href="/Ecommerce web/shop.html">Shop Now</a></div>
                    <button id="explore">Explore</button>
                </div>
            </div>
            <div class="hero-image">
                <img src="/Ecommerce web/img/couch.png" alt="">
            </div>
        </div>

        <div class="main-container">

            <!-- === Contact Info === -->
            <div class="contact-details">
                <div class="location contact-src">
                    <div class="location-icon icon"><img src="/Ecommerce web/img/location.svg" alt="location-img"></div>
                    <div class="location-data icon-text">43 Raymouth Rd. Baltemoer, London 3910</div>
                </div>
                <div class="email contact-src">
                    <div class="email-icon icon"><img src="/Ecommerce web/img/email.svg" alt="location-img"></div>
                    <div class="email-data icon-text">info@yourdomain.com</div>
                </div>
                <div class="call contact-src">
                    <div class="call-icon icon"><img src="/Ecommerce web/img/call.svg" alt="location-img"></div>
                    <div class="call-data icon-text">+1 294 3925 3939</div>
                </div>
            </div>

            <!-- === Contact Form === -->
            <form action="/submit" method="post" class="contact-form" autocomplete="on">

                <!-- First & Last Name -->
                <div class="name-field">
                    <div class="name-1 form-field">
                        <label for="first-name">First name</label>
                        <input type="text" id="first-name" name="first-name" autocomplete="given-name" required>
                    </div>
                    <div class="name-2 form-field">
                        <label for="last-name">Last name</label>
                        <!-- BUG FIX: was name="first-name" — duplicate name, last name was never submitted -->
                        <input type="text" id="last-name" name="last-name" autocomplete="family-name" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="email-field form-field">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>

                <!-- Message -->
                <div class="message-field form-field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>

                <div class="submit-field">
                    <button type="submit" class="submit-btn">Send Message</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Injected via sync.js -->
    <div id="footer-section"></div>

    <!-- sync.js loads shared header/footer; script.js handles page interactions -->
    <script src="/Ecommerce web/js/sync.js" type="module" defer></script>
    <script src="/Ecommerce web/js/script.js" type="module" defer></script>

</body>

</html>
