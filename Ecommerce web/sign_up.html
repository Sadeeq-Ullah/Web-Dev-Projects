<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/Ecommerce web/img/favicon.png" type="image">
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="/Ecommerce web/css/home.css">
    <link rel="stylesheet" href="/Ecommerce web/css/profile.css">
    <title>Sign Up - Furni.</title>
</head>

<body>
    <!-- Injected via sync.js -->
    <header></header>

    <div class="signup-content">

        <!-- === Hero Section === -->
        <div class="hero">
            <div class="hero-text">
                <h1 id="hero-heading" style="font-size: 2.8rem;">Profile</h1>
                <div class="hero-para">Donec vitae odio quis nisl dapibus malesuada. Nullam ac aliquet velit. Aliquam
                    vulputate velit imperdiet dolor tempor tristique.
                </div>
                <div class="buttons">
                    <div id="shope-now"><a href="/Ecommerce web/shop.html">Shop Now</a></div>
                    <button id="explore">Explore</button>
                </div>
            </div>
            <div class="hero-image">
                <img src="/Ecommerce web/img/couch.png" alt="">
            </div>
        </div>

        <div class="cards-section">

            <!-- Promotional card linking to sign in -->
            <div class="normal-card">
                <p class="account-para">Already have an account?</p>
                <h1 class="account-heading"><a href="/Ecommerce web/sign_in.html">Login Now!</a></h1>
                <img src="/Ecommerce web/img/couch.png" alt="" class="main-image">
            </div>

            <!-- === Registration Form === -->
            <form action="/submit" method="post" class="sign-up" autocomplete="on">
                <div class="form-title">Sign up</div>

                <!-- First & Last Name -->
                <div class="form-names">
                    <div class="form-field">
                        <label for="first-name" class="filling-field">First Name</label>
                        <input type="text" id="first-name" name="first-name" placeholder="First Name"
                            autocomplete="given-name" required>
                    </div>
                    <div class="form-field">
                        <label for="last-name" class="filling-field">Last Name</label>
                        <input type="text" id="last-name" name="last-name" placeholder="Last Name"
                            autocomplete="family-name" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-field">
                    <label for="email" class="filling-field">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Email Address"
                        autocomplete="email" required>
                </div>

                <!-- Password — new-password tells password managers this is registration, not login -->
                <div class="form-field">
                    <label for="password" class="filling-field">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password"
                        autocomplete="new-password" required>
                </div>

                <!-- Confirm Password -->
                <div class="form-field">
                    <label for="confirm-password" class="filling-field">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password"
                        placeholder="Confirm Password" autocomplete="new-password" required>
                </div>

                <!-- Phone -->
                <div class="form-field">
                    <label for="phone" class="filling-field">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="Phone"
                        autocomplete="tel" required>
                </div>

                <!-- Country — options populated dynamically via script.js -->
                <div class="form-field">
                    <label for="country" class="filling-field">Country</label>
                    <select class="country-select" name="country" id="country"
                        autocomplete="country" required>
                        <option value="" selected hidden>Select Country</option>
                    </select>
                </div>

                <!-- Date of Birth -->
                <div class="form-field">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" autocomplete="bday" required>
                </div>

                <!-- Gender -->
                <div class="form-field">
                    <label for="gender">Gender</label>
                    <select class="gender-select" name="gender" id="gender" required>
                        <option value="" hidden>Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <!-- Terms & Conditions agreement -->
                <div class="checkbox-field">
                    <input type="checkbox" id="terms-policy" name="terms-policy" required>
                    <!-- BUG FIX: was "Are you agree" — grammatically incorrect -->
                    <label for="terms-policy">Do you agree with our terms & conditions?</label>
                </div>

                <!-- Disabled until JS validates all inputs -->
                <button class="submit-button" disabled>Register</button>
            </form>

        </div>
    </div>

    <!-- Injected via sync.js -->
    <div id="footer-section"></div>

    <!-- sync.js loads shared header/footer; script.js handles form validation, country population, and registration logic -->
    <script src="/Ecommerce web/js/sync.js" type="module" defer></script>
    <script src="/Ecommerce web/js/script.js" type="module" defer></script>

</body>

</html>
